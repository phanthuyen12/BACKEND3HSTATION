<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Content Extractor</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
        }

        .upload-section {
            border: 2px dashed #e2e8f0;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background-color: #f5f3ff;
        }

        #file-input {
            display: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-block;
            width: 100%;
            font-size: 16px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .results {
            margin-top: 40px;
        }

        .result-item {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .result-header {
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }

        .status-success { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-processing { background: #fef9c3; color: #854d0e; }

        .content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #334155;
            font-size: 14px;
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-list {
            margin-bottom: 16px;
            text-align: left;
            font-size: 14px;
        }

        .file-list-item {
            padding: 4px 0;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Video Content Extractor</h1>
    <p class="subtitle">Upload multiple videos and let AI read them for you.</p>

    <div class="upload-section" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; color: #94a3b8;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p style="margin: 0; font-weight: 600;">Click to upload or drag and drop</p>
        <p style="margin: 4px 0 0; font-size: 14px; color: #94a3b8;">MP4, MOV, AVI, MKV up to 10 files</p>
    </div>

    <input type="file" id="file-input" multiple accept="video/*" onchange="updateFileList()">
    
    <div id="file-list" class="file-list"></div>

    <button id="upload-btn" class="btn" onclick="uploadVideos()" disabled>Start Processing</button>
    
    <div id="loader" class="loading-spinner"></div>

    <div id="results" class="results"></div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const fileListDiv = document.getElementById('file-list');
    const resultsDiv = document.getElementById('results');
    const loader = document.getElementById('loader');

    function updateFileList() {
        fileListDiv.innerHTML = '';
        if (fileInput.files.length > 0) {
            uploadBtn.disabled = false;
            Array.from(fileInput.files).forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-list-item';
                item.textContent = `• ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
                fileListDiv.appendChild(item);
            });
        } else {
            uploadBtn.disabled = true;
        }
    }

    async function uploadVideos() {
        const files = fileInput.files;
        if (files.length === 0) return;

        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('videos', files[i]);
        }

        uploadBtn.disabled = true;
        loader.style.display = 'block';
        resultsDiv.innerHTML = '';

        try {
            const response = await fetch('/api/ai-videos/process-batch', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.status === 'success') {
                renderResults(data.data);
            } else {
                alert('Error: ' + data.message);
            }
        } catch (error) {
            console.error('Upload failed:', error);
            alert('An error occurred during upload.');
        } finally {
            uploadBtn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function renderResults(results) {
        results.forEach(res => {
            const div = document.createElement('div');
            div.className = 'result-item';
            
            const isSuccess = res.status === 'success';
            
            div.innerHTML = `
                <div class="result-header">
                    <span>${res.fileName}</span>
                    <span class="status-badge ${isSuccess ? 'status-success' : 'status-error'}">
                        ${isSuccess ? 'Completed' : 'Failed'}
                    </span>
                </div>
                <div class="content">
                    ${isSuccess ? res.content : 'Error: ' + res.error}
                </div>
            `;
            resultsDiv.appendChild(div);
        });
    }
</script>

</body>
</html>
